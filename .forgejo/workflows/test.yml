name: LuBot Publisher CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: publisher
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: publisher_test
        ports:
          - 5432:5432
        # NOTE: no --health-* options on purpose. The Forgejo runner intermittently
        # aborted the whole job (~6s) when the service health-check wasn't green yet,
        # before any step ran. We instead start the service ungated and wait for it
        # deterministically in the "Wait for Postgres" step below.

    env:
      DATABASE_URL: postgresql://publisher:test_password@localhost:5432/publisher_test
      TIMEZONE: America/Chicago

    steps:
      - uses: actions/checkout@v4

      - name: Install Python and dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq python3 python3-pip > /dev/null 2>&1
          pip install --break-system-packages -r requirements.txt > /dev/null 2>&1
          python3 --version
          ruff --version

      - name: Wait for Postgres
        run: |
          python3 - <<'PY'
          import socket, sys, time
          for i in range(90):
              try:
                  with socket.create_connection(("127.0.0.1", 5432), timeout=2):
                      print(f"Postgres accepting connections after ~{i}s")
                      sys.exit(0)
              except OSError:
                  time.sleep(1)
          print("Postgres did not become ready within 90s")
          sys.exit(1)
          PY

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: App startup check
        run: python3 -c "from src import db; print('Import OK')"

      - name: Run tests
        run: python3 -m pytest tests/ -q --tb=short
