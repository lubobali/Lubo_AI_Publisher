# Posting schedule — randomized within windows

posting_windows:
  weekday:
    start_hour: 15  # 3 PM CT
    end_hour: 17    # through 4:59 PM CT (3-5 PM window)
  weekend:
    start_hour: 23  # 11 PM CT
    end_hour: 24    # through 11:59 PM CT (11 PM - midnight window)

timezone: America/Chicago

rules:
  max_posts_per_day: 1
  min_hour_difference: 1  # Minimum 1hr between consecutive days' post times
  pre_calculate: true     # Calculate tomorrow's time the night before
