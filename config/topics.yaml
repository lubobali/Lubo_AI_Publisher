# Topic categories — 7 topics rotating weekly
# Week N: topics shift by 1 position so Monday is NOT always the same topic

categories:
  - name: AI News
    description: Hot AI news, quick post about tools/announcements
    sources_key: ai_news

  - name: Tech Talk
    description: Lubo's senior take on a data/AI engineering topic — opinion and expertise, not a personal project log
    sources_key: tech_talk

  - name: AI Gadgets
    description: Latest AI gadgets, hardware, physical products
    sources_key: ai_gadgets

  - name: My Agent
    description: LuBot showcase — new features, real AI output
    sources_key: my_agent

  - name: Biohacker
    description: Biohacking, supplements, longevity science
    sources_key: biohacker

  - name: Building in Public
    description: Lubo's real coding week — hours, top languages, AI usage, week-over-week momentum. Honest building-in-public stats from WakaTime.
    sources_key: wakatime

  - name: My Agent Build
    description: What Lubo built this week — real commits, real code, technical deep dive
    sources_key: my_agent_git

# Rotation: shift by 1 each week. After 7 weeks, full cycle restarts.
rotation:
  shift_per_week: 1
  cycle_length: 7
