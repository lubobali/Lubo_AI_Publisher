# Publisher approval dashboard — proxy to the web container (127.0.0.1:8100).
# After DNS resolves, run:  certbot --nginx -d publisher.lubot.ai  # DONE
# (certbot adds the listen 443 ssl block + http->https redirect automatically)
server {
    server_name publisher.lubot.ai;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 20M;
    }

    listen 80;
}
