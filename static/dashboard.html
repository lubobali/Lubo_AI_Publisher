<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LuBot Publisher</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#0a0e1a; -webkit-tap-highlight-color: transparent; }
    .pre { white-space: pre-wrap; word-wrap: break-word; }
  </style>
</head>
<body class="text-slate-200 min-h-screen">
  <div class="max-w-xl mx-auto px-4 pb-24 pt-5">

    <header class="flex items-center justify-between mb-5">
      <div class="flex items-center gap-2">
        <div class="h-7 w-7 rounded-lg bg-emerald-500 flex items-center justify-center font-bold text-slate-900">L</div>
        <h1 class="text-lg font-bold tracking-tight">LuBot Publisher</h1>
      </div>
      <span id="count" class="text-sm text-emerald-400 font-semibold">…</span>
    </header>

    <div class="flex gap-2 mb-5">
      <select id="carCat" class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-sky-500"></select>
      <button onclick="genCarousel(this)" class="px-4 py-2 rounded-xl bg-sky-500 text-slate-900 font-semibold text-sm active:scale-95 transition whitespace-nowrap">✦ Carousel</button>
    </div>

    <div id="pending" class="space-y-4"></div>
    <div id="empty" class="hidden text-center text-slate-500 py-16">
      <div class="text-4xl mb-2">✓</div>
      <div>No posts waiting. You are all caught up.</div>
    </div>

    <h2 class="text-xs uppercase tracking-widest text-slate-500 mt-9 mb-3">Recent</h2>
    <div id="recent" class="space-y-2 text-sm"></div>
  </div>

  <script>
    const CAT = {
      ai_news:"AI News", tech_talk:"Tech Talk", ai_gadgets:"AI Gadgets",
      my_agent:"My Agent", biohacker:"Biohacker", wakatime:"Building in Public",
      my_agent_git:"My Agent Build"
    };
    const esc = s => (s||"").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

    // Populate the carousel category picker from CAT (once).
    (function fillCarCats() {
      const sel = document.getElementById("carCat");
      sel.innerHTML = `<option value="">Carousel: today's topic</option>` +
        Object.entries(CAT).map(([k,v]) => `<option value="${k}">Carousel: ${esc(v)}</option>`).join("");
    })();

    async function genCarousel(btn) {
      const category = document.getElementById("carCat").value || null;
      btn.disabled = true; const label = btn.textContent; btn.textContent = "…";
      try {
        const r = await fetch("/api/carousels", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ category }) });
        if (!r.ok) throw new Error(await r.text());
        btn.textContent = "✓ Generating…";
        alert("Carousel is generating in the background. It takes about a minute, then shows up below as pending. Refresh to see it.");
      } catch (e) { alert("Could not start: " + e.message); }
      finally { setTimeout(() => { btn.disabled = false; btn.textContent = label; }, 4000); }
    }
    const when = iso => { try { return new Date(iso).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); } catch { return ""; } };

    async function load() {
      const posts = await (await fetch("/api/posts")).json();
      const pending = posts.filter(p => p.status === "pending");
      const recent  = posts.filter(p => p.status !== "pending").slice(0, 8);

      document.getElementById("count").textContent = pending.length + " pending";
      document.getElementById("empty").classList.toggle("hidden", pending.length > 0);

      document.getElementById("pending").innerHTML = pending.map(p => {
        const imgCount = (p.image_path ? 1 : 0) + (p.extra_image_count||0);
        // Horizontal SWIPE strip (snap) so a carousel previews left-to-right, exactly how
        // LinkedIn shows it — not stacked vertically. Single-image posts just show one frame.
        const imgs = imgCount ? `<div class="flex overflow-x-auto snap-x snap-mandatory scroll-smooth">` +
          Array.from({length: imgCount}, (_,k)=>`
          <div class="relative shrink-0 w-full snap-start">
            <img src="/api/posts/${p.id}/image/${k}" class="w-full border-y border-slate-800" loading="lazy" onerror="this.parentElement.remove()">
            <button onclick="removeImg(${p.id},${k},this)" title="Remove image" class="absolute top-2 right-2 h-8 w-8 rounded-full bg-slate-950/80 border border-slate-700 text-slate-200 text-sm active:scale-90">✕</button>
            ${imgCount>1?`<span class="absolute bottom-2 left-2 text-[11px] px-2 py-0.5 rounded-full bg-slate-950/70 text-slate-300">${k+1}/${imgCount}</span>`:''}
          </div>`).join("") + `</div>${imgCount>1?`<div class="px-4 pt-1 text-[11px] text-slate-500">← swipe ${imgCount} slides →</div>`:''}` : "";
        return `
        <div class="bg-slate-900/70 border border-slate-800 rounded-2xl overflow-hidden">
          <div class="px-4 pt-4 flex items-center justify-between">
            <span class="text-xs font-semibold px-2 py-1 rounded-full bg-emerald-500/15 text-emerald-400">${esc(CAT[p.topic_category]||p.topic_category)}</span>
            <span class="text-xs text-slate-500">${when(p.posted_at)}</span>
          </div>
          <div id="text-${p.id}" class="px-4 py-3">
            <div class="pre text-[15px] leading-relaxed">${esc(p.post_text)}</div>
            <button onclick="editText(${p.id})" class="mt-2 text-xs text-emerald-400/80">✏️ Edit text</button>
          </div>
          ${imgs}
          <label class="block px-4 py-2 text-xs text-sky-400/90 cursor-pointer active:opacity-70">＋ Add image
            <input type="file" accept="image/*" class="hidden" onchange="addImg(${p.id}, this)">
          </label>
          ${(p.hashtags&&p.hashtags.length)?`<div class="px-4 pt-1 pb-1 text-emerald-400/80 text-sm">${esc(p.hashtags.join(" "))}</div>`:""}
          <div class="p-3 grid grid-cols-2 gap-2">
            <button onclick="act(${p.id},'approve',this)" class="py-3 rounded-xl bg-emerald-500 text-slate-900 font-semibold active:scale-95 transition">✓ Approve &amp; Post</button>
            <button onclick="act(${p.id},'reject',this)" class="py-3 rounded-xl bg-slate-800 text-slate-300 font-semibold active:scale-95 transition">✕ Reject</button>
          </div>
        </div>`;
      }).join("");

      document.getElementById("recent").innerHTML = recent.map(p => `
        <div class="flex items-center gap-2 text-slate-400">
          <span class="${p.status==='rejected'?'text-rose-400':'text-emerald-400'}">${p.status==='rejected'?'✕':'✓'}</span>
          <span class="truncate flex-1">${esc(CAT[p.topic_category]||p.topic_category)} — ${esc((p.post_text||'').slice(0,60))}…</span>
        </div>`).join("") || `<div class="text-slate-600">Nothing yet.</div>`;
    }

    async function act(id, what, btn) {
      btn.disabled = true; btn.textContent = "…";
      try {
        const r = await fetch(`/api/posts/${id}/${what}`, { method: "POST" });
        if (!r.ok) throw new Error(await r.text());
        await load();
      } catch (e) { alert("Failed: " + e.message); btn.disabled = false; }
    }

    // --- edit-before-approve ---
    function editText(id) {
      const box = document.getElementById("text-" + id);
      const cur = box.querySelector(".pre").textContent;
      box.innerHTML =
        `<textarea id="ta-${id}" rows="12" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-[15px] leading-relaxed focus:outline-none focus:border-emerald-500">${esc(cur)}</textarea>
         <div class="flex gap-2 mt-2">
           <button onclick="saveText(${id},this)" class="px-3 py-1.5 rounded-lg bg-emerald-500 text-slate-900 text-sm font-semibold">Save</button>
           <button onclick="load()" class="px-3 py-1.5 rounded-lg bg-slate-800 text-slate-300 text-sm">Cancel</button>
         </div>`;
      document.getElementById("ta-" + id).focus();
    }
    async function saveText(id, btn) {
      const val = document.getElementById("ta-" + id).value;
      btn.disabled = true; btn.textContent = "…";
      try {
        const r = await fetch(`/api/posts/${id}`, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ post_text: val }) });
        if (!r.ok) throw new Error(await r.text());
        await load();
      } catch (e) { alert("Save failed: " + e.message); btn.disabled = false; btn.textContent = "Save"; }
    }
    async function addImg(id, input) {
      if (!input.files || !input.files[0]) return;
      const fd = new FormData(); fd.append("file", input.files[0]);
      input.disabled = true;
      try {
        const r = await fetch(`/api/posts/${id}/images`, { method: "POST", body: fd });
        if (!r.ok) throw new Error(await r.text());
        await load();
      } catch (e) { alert("Upload failed: " + e.message); input.disabled = false; }
    }
    async function removeImg(id, idx, btn) {
      if (!confirm("Remove this image?")) return;
      btn.disabled = true;
      try {
        const r = await fetch(`/api/posts/${id}/images/${idx}`, { method: "DELETE" });
        if (!r.ok) throw new Error(await r.text());
        await load();
      } catch (e) { alert("Remove failed: " + e.message); btn.disabled = false; }
    }

    load();
  </script>
</body>
</html>
